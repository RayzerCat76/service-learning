<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Admin</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
        body{background:#f5f7fa;padding:20px;max-width:1200px;margin:auto}
        .box{background:white;padding:24px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px}
        h2,h3{margin-bottom:16px;color:#2d3748;border-bottom:1px solid #eee;padding-bottom:8px}
        .form-group{margin-bottom:14px}
        input,textarea,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
        button{padding:10px 16px;border-radius:6px;border:none;cursor:pointer;margin-right:8px}
        .btn-blue{background:#3498db;color:white}
        .btn-red{background:#e74c3c;color:white}
        .btn-green{background:#2ecc71;color:white}
        .btn-orange{background:#f39c12;color:white}
        .hidden{display:none}
        .preview{position:relative;width:100%;height:420px;background:#fafafa;border:1px solid #ddd;border-radius:10px;overflow:hidden;margin-top:16px}
        .block{position:absolute;padding:12px;background:white;border:1px solid #3498db;cursor:move;overflow:hidden;font-size:14px;line-height:1.5}
        .resize-handle{position:absolute;right:0;bottom:0;width:16px;height:16px;background:#3498db;cursor:se-resize}
        .color-box{width:44px;height:44px;border-radius:6px;border:2px solid #ddd}
        .color-row{display:flex;align-items:center;gap:10px}
        input[type="color"]{display:none}
    </style>
</head>
<body>

<div class="box" id="loginPanel">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="User" value="master"><br><br>
    <input type="password" id="password" placeholder="Pass" value="master123"><br><br>
    <button class="btn-blue" onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">
    <div class="box">
        <h2>Admin Panel <button class="btn-red" onclick="logout()">Logout</button></h2>
    </div>

    <div class="box">
        <h3>Programs</h3>
        <input type="text" id="newProgName" placeholder="Program Name">
        <button class="btn-green" onclick="createProgram()">Create</button>
        <br><br>
        <select id="programSelect" onchange="selectProgram(this.value)"></select>
        <button class="btn-red" onclick="deleteProgram()">Delete</button>
    </div>

    <div class="box">
        <h3>Edit Block</h3>
        <input type="text" id="blockTitle" placeholder="Title"><br><br>
        <textarea id="blockContent" rows="3" placeholder="Content"></textarea><br>
        <div>
            <div>BG Color</div>
            <div class="color-row">
                <div id="bgBox" class="color-box"></div>
                <input type="color" id="bgColor" value="#ffffff">
            </div>
        </div>
        <div>
            <div>Text Color</div>
            <div class="color-row">
                <div id="textColorBox" class="color-box"></div>
                <input type="color" id="textColor" value="#000000">
            </div>
        </div>
        <button class="btn-blue" onclick="updateBlock()">SAVE BLOCK</button>
    </div>

    <div class="box">
        <h3>Layout</h3>
        <button class="btn-orange" onclick="generateTabTemplate()">Generate Template</button>
        <button class="btn-blue" onclick="saveLayout()">SAVE LAYOUT</button>
        <div class="preview"><div id="stage"></div></div>
    </div>
</div>

<script>
const API_URL = "/api";
let currentUser, isSuperAdmin;
let programs = [], selectedProgram;
let blocks = [], selectedBlock;

const bgColor = document.getElementById("bgColor");
const textColor = document.getElementById("textColor");
const bgBox = document.getElementById("bgBox");
const textColorBox = document.getElementById("textColorBox");

bgColor.addEventListener("input", syncColors);
textColor.addEventListener("input", syncColors);
function syncColors(){bgBox.style.backgroundColor=bgColor.value;textColorBox.style.backgroundColor=textColor.value}

async function login(){
    const user=document.getElementById("username").value;
    const pass=document.getElementById("password").value;
    const r=await fetch(API_URL+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    currentUser=d.user.username;
    isSuperAdmin=d.user.role==="master";
    document.getElementById("loginPanel").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadPrograms();
    syncColors();
}

function logout(){location.reload()}

async function loadPrograms(){
    const res=await fetch(`${API_URL}/programs?user=${currentUser}&admin=${isSuperAdmin}`);
    programs=await res.json();
    const sel=document.getElementById("programSelect");
    sel.innerHTML="";
    programs.forEach(p=>{const o=document.createElement("option");o.value=p.id;o.innerText=p.name;sel.appendChild(o)});
    if(programs.length)selectProgram(programs[0].id);
}

function selectProgram(id){
    selectedProgram=programs.find(p=>p.id==id);
    try{blocks=JSON.parse(selectedProgram.blocks||"[]")}catch{e=>blocks=[]}
    renderBlocks();
}

async function createProgram(){
    const name=document.getElementById("newProgName").value||"New";
    await fetch(API_URL+"/programs",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        name,createdBy:currentUser,blocks:"[]",news:"[]"
    })});
    loadPrograms();
}

async function deleteProgram(){
    if(!selectedProgram)return;
    await fetch(`${API_URL}/programs/${selectedProgram.id}`,{method:"DELETE"});
    loadPrograms();
}

function renderBlocks(){
    const s=document.getElementById("stage");s.innerHTML="";
    blocks.forEach(b=>{
        const e=document.createElement("div");e.className="block";e.dataset.id=b.id;
        e.style.left=b.x+"%";e.style.top=b.y+"%";e.style.width=b.w+"%";e.style.height=b.h+"%";
        e.style.backgroundColor=b.bg;e.style.color=b.text;e.style.border=b.border;
        e.innerHTML=`<strong>${b.title}</strong><br>${b.content}`;
        
        const rh=document.createElement("div");rh.className="resize-handle";e.appendChild(rh);
        
        e.onclick=()=>{selectedBlock=b;document.getElementById("blockTitle").value=b.title;document.getElementById("blockContent").value=b.content;bgColor.value=b.bg;textColor.value=b.text;syncColors()};
        
        let drag=0,sx,sy,ox,oy;
        e.addEventListener("mousedown",ev=>{if(ev.target===rh)return;ev.preventDefault();drag=1;sx=ev.clientX;sy=ev.clientY;ox=parseFloat(e.style.left);oy=parseFloat(e.style.top)});
        
        let resize=0,sw,sh;
        rh.addEventListener("mousedown",ev=>{ev.preventDefault();resize=1;sx=ev.clientX;sy=ev.clientY;sw=parseFloat(e.style.width);sh=parseFloat(e.style.height)});
        
        document.addEventListener("mousemove",ev=>{
            const rect=s.getBoundingClientRect();
            if(drag){const dx=(ev.clientX-sx)/rect.width*100;const dy=(ev.clientY-sy)/rect.height*100;e.style.left=Math.max(0,Math.min(100,ox+dx))+"%";e.style.top=Math.max(0,Math.min(100,oy+dy))+"%";}
            if(resize){const dx=(ev.clientX-sx)/rect.width*100;const dy=(ev.clientY-sy)/rect.height*100;e.style.width=Math.max(5,Math.min(100,sw+dx))+"%";e.style.height=Math.max(5,Math.min(100,sh+dy))+"%";}
        });
        
        document.addEventListener("mouseup",()=>{drag=0;resize=0});
        s.appendChild(e);
    });
}

async function updateBlock(){
    if(!selectedBlock)return;
    selectedBlock.title=document.getElementById("blockTitle").value;
    selectedBlock.content=document.getElementById("blockContent").value;
    selectedBlock.bg=bgColor.value;
    selectedBlock.text=textColor.value;
    renderBlocks();
    await fetch(`${API_URL}/programs/${selectedProgram.id}/blocks`,{
        method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({blocks:JSON.stringify(blocks)})
    });
}

async function saveLayout(){
    blocks.forEach(b=>{const el=document.querySelector(`[data-id="${b.id}"]`);b.x=parseFloat(el.style.left);b.y=parseFloat(el.style.top);b.w=parseFloat(el.style.width);b.h=parseFloat(el.style.height)});
    await fetch(`${API_URL}/programs/${selectedProgram.id}/blocks`,{
        method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({blocks:JSON.stringify(blocks)})
    });
    renderBlocks();
    alert("Saved to database!");
}

function generateTabTemplate(){
    blocks=[
        {id:"info",title:"Basic Info",content:"",x:2,y:5,w:46,h:90,bg:"#fff",text:"#000",border:"1px solid #ccc"},
        {id:"contact",title:"Contact",content:"",x:52,y:5,w:46,h:90,bg:"#fff",text:"#000",border:"1px solid #ccc"}
    ];
    renderBlocks();
}
</script>
</body>
</html>
