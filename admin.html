<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <style>
    body { padding: 20px; font-family: Arial; max-width: 400px; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 10px #ccc; }
    input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <input id="user" value="master" placeholder="Username">
    <input id="pass" type="password" value="master123" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="dash" style="display:none; margin-top:20px;" class="card">
    <h2>Welcome!</h2>
    <p>You are logged in.</p>
  </div>

  <script>
    async function login() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });

        const data = await res.json();
        if (data.success) {
          document.getElementById('dash').style.display = 'block';
        } else alert('Login failed');
      } catch (err) {
        alert('Network error: ' + err.message);
      }
    }
  </script>
</body>
</html>
