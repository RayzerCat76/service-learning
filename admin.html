<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
    .hidden { display: none; }
    .form-group { margin: 15px 0; }
    label { display: block; margin-bottom: 5px; }
    input, textarea, select { width: 100%; padding: 8px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    .error { color: red; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <h1>Admin Login</h1>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" value="master">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password">
    </div>
    <button onclick="login()">Login</button>
    <p id="loginError" class="error hidden"></p>
  </div>

  <!-- Admin Panel -->
  <div id="adminScreen" class="hidden">
    <h1>Program Admin</h1>
    <button onclick="loadPrograms()">Refresh Programs</button>
    <div id="programList"></div>

    <hr>
    <h2>Add/Edit Program</h2>
    <div class="form-group">
      <label>Program Name</label>
      <input type="text" id="progName">
    </div>
    <div class="form-group">
      <label>Info Block</label>
      <textarea id="progInfo"></textarea>
    </div>
    <div class="form-group">
      <label>Contact Block</label>
      <textarea id="progContact"></textarea>
    </div>
    <div class="form-group">
      <label>News (comma-separated)</label>
      <input type="text" id="progNews">
    </div>
    <button onclick="saveProgram()">Save Program</button>
  </div>

  <script>
    const API_URL = "/api/programs";
    let currentUser = null;

    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      if (user === "master" && pass === "your-password-here") {
        currentUser = user;
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("adminScreen").classList.remove("hidden");
        loadPrograms();
      } else {
        document.getElementById("loginError").textContent = "Invalid credentials";
        document.getElementById("loginError").classList.remove("hidden");
      }
    }

    async function loadPrograms() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("Failed to load programs");
        const programs = await res.json();
        
        let html = "<h3>Existing Programs:</h3>";
        programs.forEach(p => {
          html += `
            <div>
              <strong>${p.name}</strong>
              <button onclick="editProgram(${p.id})">Edit</button>
            </div>
          `;
        });
        document.getElementById("programList").innerHTML = html;
      } catch (err) {
        alert("Error loading programs: " + err.message);
      }
    }

    async function saveProgram() {
      const name = document.getElementById("progName").value;
      const info = document.getElementById("progInfo").value;
      const contact = document.getElementById("progContact").value;
      const news = document.getElementById("progNews").value.split(",").map(n => n.trim());

      const blocks = [
        { id: "info", title: "Info", content: info },
        { id: "contact", title: "Contact", content: contact }
      ];

      const data = { name, created_by: currentUser, blocks, news };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error("Failed to save");
        alert("Program saved!");
        loadPrograms();
      } catch (err) {
        alert("Error saving program: " + err.message);
      }
    }

    function editProgram(id) {
      // Basic edit function - expand this if needed
      alert("Edit functionality coming soon!");
    }
  </script>
</body>
</html>
