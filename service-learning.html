<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Service Learning</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fa; padding:20px; margin:0; }
        .page-head { text-align:center; margin-bottom:30px; }
        .tab-buttons { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .tab-btn { padding:12px 20px; border:none; border-radius:6px; cursor:pointer; background:#ddd; }
        .tab-btn.active { background:#3498db; color:white; }
        .tab-view { display:none; position:relative; width:100%; height:600px; }
        .tab-view.active { display:block; }
        .dyn-module { position:absolute; padding:20px; border-radius:8px; border:2px solid; overflow:auto; }
    </style>
</head>
<body>
    <div class="page-head"><h1>School Service Learning</h1></div>
    <div class="tab-buttons" id="stuTabs"></div>
    <div id="stuViews"></div>

<script>
let projs = JSON.parse(localStorage.projects||'{}');
// Build Tabs
let tabHtml='', viewHtml='', first=true;
Object.keys(projs).forEach(pid=>{
    let p = projs[pid];
    tabHtml += `<button class="tab-btn ${first?'active':''}" data-pid="${pid}">${p.name}</button>`;
    // Build Absolute Layout View
    viewHtml += `<div class="tab-view ${first?'active':''}" id="view-${pid}">`;
    Object.keys(p.modules).forEach(mid=>{
        let m = p.modules[mid];
        viewHtml += `<div class="dyn-module" style="left:${m.style.x}%;top:${m.style.y}%;width:${m.style.w}%;height:${m.style.h}%;background:${m.style.bg};color:${m.style.txt};border-color:${m.style.border};">
            <h3>${mid.toUpperCase()}</h3>${m.text}
        </div>`;
    });
    viewHtml += `</div>`;
    first=false;
});
document.getElementById('stuTabs').innerHTML = tabHtml;
document.getElementById('stuViews').innerHTML = viewHtml;
// Tab Switch Logic
document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('view-'+btn.dataset.pid).classList.add('active');
    };
});
</script>
</body>
</html>
