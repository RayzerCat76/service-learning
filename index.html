<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Learning Projects</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f1f1f1;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }
        .header-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .program-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            background: #e0e0e0;
        }
        .tab-btn.active {
            background: #3498db;
            color: white;
        }
        .block {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .block-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .block-half {
            flex: 1;
            min-width: 300px;
        }
        #newsContent div {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="header-box">
        <h1>Service Learning Projects</h1>
    </div>

    <div class="program-tabs" id="programTabs"></div>

    <div class="block-row">
        <div class="block block-half">
            <h3>Basic Information</h3>
            <p id="infoText"></p>
        </div>
        <div class="block block-half">
            <h3>Contact Information</h3>
            <p id="contactText"></p>
        </div>
    </div>

    <div class="block">
        <h3>Latest News</h3>
        <div id="newsContent">Loading news...</div>
    </div>

    <script>
        const API_URL = "/api/programs";
        let programs = [];
        let activeProgramId = null;

        // FORCE FRESH DATA — NO CACHING
        async function fetchFresh(url) {
            const res = await fetch(url, { cache: "no-store" });
            return await res.json();
        }

        // Load ALL programs fresh
        async function loadAllPrograms() {
            programs = await fetchFresh(API_URL);
            renderProgramTabs();
            if (programs.length) switchProgram(programs[0].id);
        }

        // Render clickable program tabs
        function renderProgramTabs() {
            const container = document.getElementById("programTabs");
            container.innerHTML = "";
            programs.forEach(prog => {
                const btn = document.createElement("button");
                btn.className = "tab-btn" + (prog.id === activeProgramId ? " active" : "");
                btn.innerText = prog.name;
                btn.onclick = () => switchProgram(prog.id);
                container.appendChild(btn);
            });
        }

        // Switch to a program — LOAD FRESH FROM DATABASE
        async function switchProgram(programId) {
            activeProgramId = programId;
            renderProgramTabs();

            // 👇 THIS LINE FORCES FULL REFRESH FROM DB
            const program = await fetchFresh(`${API_URL}/${programId}`);

            // Update layout blocks LIVE
            renderLayout(program.blocks || []);

            // Update news LIVE
            renderNews(program.news || []);
        }

        // Render layout blocks from DB
        function renderLayout(blocks) {
            let info = "", contact = "";
            blocks.forEach(b => {
                if (b.id === "info" || b.title.toLowerCase().includes("info")) info = b.content;
                if (b.id === "contact" || b.title.toLowerCase().includes("contact")) contact = b.content;
            });
            document.getElementById("infoText").innerText = info || "No content yet";
            document.getElementById("contactText").innerText = contact || "No content yet";
        }

        // Render news from DB
        function renderNews(newsList) {
            const container = document.getElementById("newsContent");
            if (!newsList || newsList.length === 0) {
                container.innerHTML = "No news available";
                return;
            }
            container.innerHTML = newsList.map(item => `
                <div>
                    <strong>${item.title}</strong><br>
                    ${item.overview || ""}
                </div>
            `).join("");
        }

        // Start the page
        loadAllPrograms();
    </script>
</body>
</html>
