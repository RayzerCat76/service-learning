<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }
        .bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 18px;
            background: #e6e6e6;
            border: none;
            border-radius: 6px;
            margin: 5px;
            cursor: pointer;
        }
        .tab.active {
            background: #3498db;
            color: white;
        }
        .two {
            display: flex;
            gap: 20px;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 50%;
            min-height: 400px;
        }
        .box h3 {
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="bar">
    <h2>Projects</h2>
    <div id="tabs"></div>
</div>
<div id="content"></div>

<script>
const API = "/api";
let programs = [];
let currentProgram;

async function load() {
    const res = await fetch(`${API}/programs?admin=true`);
    programs = await res.json();
    if (programs.length) {
        currentProgram = programs[0];
        render();
    }
}

function render() {
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";
    programs.forEach(p => {
        const btn = document.createElement("button");
        btn.className = "tab" + (p.id === currentProgram.id ? " active" : "");
        btn.innerText = p.name;
        btn.onclick = () => {
            currentProgram = p;
            render();
        };
        tabsDiv.appendChild(btn);
    });

    // Get blocks from DB
    let blocks = [];
    try {
        // Handle both string JSON and parsed jsonb
        blocks = typeof currentProgram.blocks === "string"
            ? JSON.parse(currentProgram.blocks || "[]")
            : (Array.isArray(currentProgram.blocks) ? currentProgram.blocks : []);
    } catch (e) {
        blocks = [];
    }

    // Match your current layout: "Info" and "Contact" boxes
    const info = blocks.find(x => x.id === "info") || { title: "Info", content: "" };
    const contact = blocks.find(x => x.id === "contact") || { title: "Contact", content: "" };

    document.getElementById("content").innerHTML = `
    <div class="two">
        <div class="box">
            <h3>${info.title}</h3>
            <p>${info.content}</p>
        </div>
        <div class="box">
            <h3>${contact.title}</h3>
            <p>${contact.content}</p>
        </div>
    </div>`;
}

// No auto-refresh, load once on page open
load();
</script>
</body>
</html>
