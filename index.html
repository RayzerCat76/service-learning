<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Learning Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }
        .header-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .tab-btn {
            padding: 10px 18px;
            background: #e6e6e6;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #3498db;
            color: white;
        }
        .two-column {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 50%;
            min-height: 400px;
        }
        .card h3 {
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .news-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
        }
        .news-section h3 {
            margin-bottom: 15px;
        }
        .news-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h1>Service Learning Projects</h1>
    <div class="tab-buttons" id="tabs"></div>
</div>

<div class="two-column" id="content"></div>

<div class="news-section">
    <h3>Latest News</h3>
    <div id="news-container"></div>
</div>

<script>
const API = "/api/programs";
let programs = [];
let currentProgram;

// Load programs from the API
fetch(API)
    .then(res => {
        if (!res.ok) throw new Error("API failed");
        return res.json();
    })
    .then(data => {
        programs = data;
        if (programs.length > 0) {
            currentProgram = programs[0];
            renderAll();
        } else {
            document.getElementById("tabs").innerHTML = "<p>No programs found.</p>";
            document.getElementById("content").innerHTML = "<p>No content to display.</p>";
            document.getElementById("news-container").innerHTML = "<p>No news yet.</p>";
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById("tabs").innerHTML = "<p>Failed to load programs.</p>";
        document.getElementById("content").innerHTML = "<p>Failed to load content.</p>";
        document.getElementById("news-container").innerHTML = "<p>Failed to load news.</p>";
    });

function renderAll() {
    renderTabs();
    renderInfoCards();
    renderNews();
}

function renderTabs() {
    const tabsDiv = document.getElementById("tabs");
    tabsDiv.innerHTML = "";
    programs.forEach(prog => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (prog.id === currentProgram.id ? " active" : "");
        btn.innerText = prog.name;
        btn.onclick = () => {
            currentProgram = prog;
            renderAll();
        };
        tabsDiv.appendChild(btn);
    });
}

function renderInfoCards() {
    const contentDiv = document.getElementById("content");
    contentDiv.innerHTML = "";
    let blocks = [];
    try {
        blocks = typeof currentProgram.blocks === "string"
            ? JSON.parse(currentProgram.blocks || "[]")
            : (Array.isArray(currentProgram.blocks) ? currentProgram.blocks : []);
    } catch (e) {
        blocks = [];
    }
    const info = blocks.find(b => b.id === "info") || { title: "Info", content: "" };
    const contact = blocks.find(b => b.id === "contact") || { title: "Contact", content: "" };
    contentDiv.innerHTML = `
        <div class="card">
            <h3>${info.title}</h3>
            <p>${info.content}</p>
        </div>
        <div class="card">
            <h3>${contact.title}</h3>
            <p>${contact.content}</p>
        </div>
    `;
}

function renderNews() {
    const newsDiv = document.getElementById("news-container");
    newsDiv.innerHTML = "";
    let news = [];
    try {
        news = typeof currentProgram.news === "string"
            ? JSON.parse(currentProgram.news || "[]")
            : (Array.isArray(currentProgram.news) ? currentProgram.news : []);
    } catch (e) {
        news = [];
    }
    if (news.length === 0) {
        newsDiv.innerHTML = "<p>No news yet.</p>";
        return;
    }
    news.forEach(item => {
        const p = document.createElement("div");
        p.className = "news-item";
        p.innerText = item;
        newsDiv.appendChild(p);
    });
}
</script>
</body>
</html>
