<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Page</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial; }
        body { padding: 20px; max-width: 1000px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #eee; border-radius: 6px; cursor: pointer; border: none; }
        .tab.active { background: #3498db; color: white; }
        .preview { position: relative; width: 100%; height: 500px; background: #fafafa; border: 1px solid #ddd; border-radius: 10px; }
        .block { position: absolute; padding: 16px; background: white; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab active" onclick="show(0)">Tab 1</button>
    <button class="tab" onclick="show(1)">Tab 2</button>
</div>

<div class="preview"><div id="stage"></div></div>

<script>
const API = "/api";
let programs = [];
let currentTab = 0;

// NO AUTO-REFRESH
window.addEventListener('load', async () => {
    const res = await fetch(`${API}/programs`);
    programs = await res.json();
    renderPublic();
});

function show(index) {
    currentTab = index;
    renderPublic();
}

function renderPublic() {
    const s = document.getElementById("stage");
    s.innerHTML = "";

    // Load LIVE blocks from DB
    if (!programs || !programs[currentTab]) return;
    let p = programs[currentTab];
    let blocks = Array.isArray(p.blocks) ? p.blocks : JSON.parse(p.blocks || "[]");

    blocks.forEach(b => {
        const d = document.createElement("div");
        d.className = "block";
        d.style.left = b.x + "%";
        d.style.top = b.y + "%";
        d.style.width = b.w + "%";
        d.style.height = b.h + "%";
        d.style.background = b.bg;
        d.style.color = b.text;
        d.style.border = b.border;
        d.innerHTML = `<strong>${b.title}</strong><br>${b.content}`;
        s.appendChild(d);
    });
}
</script>
</body>
</html>
