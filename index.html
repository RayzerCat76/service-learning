<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Learning Projects</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f1f1f1;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }
        .header-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .program-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .tab-btn.active {
            background: #3498db;
            color: white;
        }
        .block {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .block-row {
            display: flex;
            gap: 20px;
        }
        .block-half {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="header-box">
        <h1>Service Learning Projects</h1>
    </div>

    <div class="program-tabs" id="programTabs">
        <!-- Tabs will load here -->
    </div>

    <div class="block-row">
        <div class="block block-half" id="infoBlock">
            <h3>Basic Information</h3>
            <p id="infoContent"></p>
        </div>
        <div class="block block-half" id="contactBlock">
            <h3>Contact Information</h3>
            <p id="contactContent"></p>
        </div>
    </div>

    <div class="block" id="newsBlock">
        <h3>Latest News</h3>
        <div id="newsContent">No news yet</div>
    </div>

    <script>
        const API_URL = "/api/programs";
        let programs = [];
        let currentProgramId = null;

        async function init() {
            try {
                const res = await fetch(API_URL);
                programs = await res.json();
                renderTabs();
                if (programs.length > 0) {
                    switchProgram(programs[0].id);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById("programTabs");
            tabsContainer.innerHTML = "";
            programs.forEach(p => {
                const btn = document.createElement("button");
                btn.className = "tab-btn" + (p.id === currentProgramId ? " active" : "");
                btn.textContent = p.name;
                btn.onclick = () => switchProgram(p.id);
                tabsContainer.appendChild(btn);
            });
        }

        async function switchProgram(id) {
            currentProgramId = id;
            renderTabs();
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const program = await res.json();
                updateLayoutBlocks(program.blocks);
                updateNews(program.news);
            } catch (err) {
                console.error(err);
            }
        }

        function updateLayoutBlocks(blocks = []) {
            const infoBlock = document.getElementById("infoContent");
            const contactBlock = document.getElementById("contactContent");

            // Clear existing content
            infoBlock.innerHTML = "";
            contactBlock.innerHTML = "";

            // Fill Basic/Contact blocks
            blocks.forEach(b => {
                if (b.title.toLowerCase().includes("info")) {
                    infoBlock.textContent = b.content || "";
                } else if (b.title.toLowerCase().includes("contact")) {
                    contactBlock.textContent = b.content || "";
                }
            });
        }

        function updateNews(news = []) {
            const newsContainer = document.getElementById("newsContent");
            if (!news || news.length === 0) {
                newsContainer.innerHTML = "No news yet";
                return;
            }

            newsContainer.innerHTML = "";
            news.forEach(item => {
                const newsItem = document.createElement("div");
                newsItem.style.marginBottom = "10px";
                newsItem.innerHTML = `
                    <strong>${item.title}</strong>
                    <p style="margin:4px 0;color:#555;">${item.overview || ""}</p>
                `;
                newsContainer.appendChild(newsItem);
            });
        }

        // Start
        init();
    </script>
</body>
</html>
