<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Learning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      padding: 30px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .header-bar {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .tab-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #e0e0e0;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: #3b82f6;
      color: white;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin-bottom: 12px;
      color: #222;
    }

    .news-section {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .news-item {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .news-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1>Service Learning Projects</h1>
  </div>

  <div class="tab-buttons" id="tabs"></div>

  <div class="two-column" id="content"></div>

  <div class="news-section">
    <h3>Latest News</h3>
    <div id="news-container"></div>
  </div>

  <script>
    const API = "/api/programs";
    let programs = [];
    let currentProgram = null;

    // Load data from API
    fetch(API)
      .then(res => res.json())
      .then(data => {
        programs = data;
        if (programs.length > 0) {
          currentProgram = programs[0];
          renderAll();
        }
      })
      .catch(err => console.error("Error loading data:", err));

    function renderAll() {
      renderTabs();
      renderInfoCards();
      renderNews();
    }

    // Show project tabs
    function renderTabs() {
      const tabsDiv = document.getElementById("tabs");
      tabsDiv.innerHTML = "";

      programs.forEach(prog => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (prog.id === currentProgram.id ? " active" : "");
        btn.innerText = prog.name;
        btn.onclick = () => {
          currentProgram = prog;
          renderAll();
        };
        tabsDiv.appendChild(btn);
      });
    }

    // Show info & contact
    function renderInfoCards() {
      const contentDiv = document.getElementById("content");
      let blocks = [];

      try {
        blocks = typeof currentProgram.blocks === "string"
          ? JSON.parse(currentProgram.blocks || "[]")
          : (Array.isArray(currentProgram.blocks) ? currentProgram.blocks : []);
      } catch (e) {}

      const info = blocks.find(b => b.id === "info") || { title: "Info", content: "No info yet" };
      const contact = blocks.find(b => b.id === "contact") || { title: "Contact", content: "No contact yet" };

      contentDiv.innerHTML = `
        <div class="card">
          <h3>${info.title}</h3>
          <p>${info.content}</p>
        </div>
        <div class="card">
          <h3>${contact.title}</h3>
          <p>${contact.content}</p>
        </div>
      `;
    }

    // Show news
    function renderNews() {
      const newsDiv = document.getElementById("news-container");
      let news = [];

      try {
        news = typeof currentProgram.news === "string"
          ? JSON.parse(currentProgram.news || "[]")
          : (Array.isArray(currentProgram.news) ? currentProgram.news : []);
      } catch (e) {}

      if (news.length === 0) {
        newsDiv.innerHTML = "<p>No news yet</p>";
        return;
      }

      newsDiv.innerHTML = news.map(item => `
        <div class="news-item">${item}</div>
      `).join("");
    }
  </script>
</body>
</html>
