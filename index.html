<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Service Learning</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body { background: #f5f7fa; }

        /* TOP SCROLLABLE NEWS BANNER */
        .top-banner {
            background: #2d3748;
            padding: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
        }
        .banner-inner {
            display: inline-flex;
            gap: 12px;
            padding: 0 10px;
        }
        .banner-news {
            width: 280px;
            height: 120px;
            background-size: cover;
            background-position: center;
            color: white;
            padding: 15px;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        .banner-news::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            z-index: 0;
        }
        .banner-news h4, .banner-news p {
            position: relative;
            z-index: 1;
        }
        .banner-news h4 {
            font-size: 16px;
            margin-bottom: 6px;
        }
        .banner-news p {
            font-size: 13px;
            opacity: 0.9;
        }

        /* TABS */
        .tab-bar {
            background: #3498db;
            display: flex;
            gap: 6px;
            padding: 12px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .tab.active {
            background: white;
            color: #3498db;
            font-weight: bold;
        }

        /* PROGRAM CONTENT */
        .tab-content {
            display: none;
            padding: 30px 20px;
            max-width: 1000px;
            margin: auto;
        }
        .tab-content.active {
            display: block;
        }
        .content-block {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            line-height: 1.6;
            white-space: pre-line;
        }

        /* PROGRAM-SPECIFIC NEWS */
        .program-news {
            margin: 20px 0;
        }
        .program-news h3 {
            margin-bottom: 12px;
            color: #2d3748;
        }
        .news-card {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            cursor: pointer;
        }
        .news-card h4 {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<!-- TOP SCROLLABLE NEWS BANNER -->
<div class="top-banner">
    <div class="banner-inner" id="topBanner"></div>
</div>

<!-- PROGRAM TABS -->
<div class="tab-bar" id="tabBar"></div>

<!-- PROGRAM CONTENT -->
<div id="tabContainer"></div>

<script>
// 🔴 Global function to RELOAD ALL NEWS
function reloadAllNews() {
    loadTopBanner();
    loadProgramTabs();
}

// LOAD 3 LATEST NEWS IN TOP BANNER
function loadTopBanner() {
    const all = [];
    const progs = JSON.parse(localStorage.getItem('sl_programs') || '[]');
    progs.forEach(p => {
        // Check if the program has news before adding to the list
        if (p.news && p.news.length > 0) {
            p.news.forEach(n => all.push(n));
        }
    });
    all.sort((a,b) => new Date(b.date) - new Date(a.date));
    const latest = all.slice(0,3);

    const banner = document.getElementById('topBanner');
    banner.innerHTML = '';
    latest.forEach(n => {
        const div = document.createElement('div');
        div.className = 'banner-news';
        div.style.backgroundImage = `url(${n.bgImage || ''})`;
        div.innerHTML = `<h4>${n.title}</h4><p>${n.overview}</p>`;
        div.onclick = () => location.href = `news-detail.html?id=${n.id}`;
        banner.appendChild(div);
    });
}

// LOAD PROGRAMS & TABS
function loadProgramTabs() {
    const progs = JSON.parse(localStorage.getItem('sl_programs') || '[]');
    const tabBar = document.getElementById('tabBar');
    const container = document.getElementById('tabContainer');

    tabBar.innerHTML = '';
    container.innerHTML = '';

    progs.forEach((p, idx) => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (idx===0?' active':'');
        tab.innerText = p.name;
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`c${p.id}`).classList.add('active');
        };
        tabBar.appendChild(tab);

        const content = document.createElement('div');
        content.className = 'tab-content' + (idx===0?' active':'');
        content.id = `c${p.id}`;

        // PROGRAM BLOCKS
        p.blocks.forEach(b => {
            content.innerHTML += `
            <div class="content-block" style="background:${b.bg};color:${b.text};border:${b.border}">
                <h3>${b.title}</h3>${b.content}
            </div>`;
        });

        // PROGRAM-SPECIFIC NEWS (fixed to check for news existence)
        content.innerHTML += `<div class="program-news"><h3>Latest News</h3>`;
        if (p.news && p.news.length > 0) {
            p.news.forEach(n => {
                content.innerHTML += `
                <div class="news-card" onclick="location.href='news-detail.html?id=${n.id}'">
                    <h4>${n.title}</h4><p>${n.overview}</p>
                </div>`;
            });
        } else {
            content.innerHTML += `<p>No news yet for this program.</p>`;
        }
        content.innerHTML += `</div>`;
        container.appendChild(content);
    });
}

// ✅ Auto-refresh news every 2 seconds
setInterval(reloadAllNews, 2000);

// ✅ Cross-tab sync
window.addEventListener('storage', (e) => {
    if (e.key === 'sl_programs') reloadAllNews();
});

// ✅ Initial load
reloadAllNews();
</script>
</body>
</html>
