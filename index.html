<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .tab-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .tab-btn {
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 8px;
            background: #e0e0e0;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #3498db;
            color: white;
        }

        .content {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 50%;
            min-height: 400px;
        }

        .card h2 {
            margin-bottom: 1rem;
            color: #2d3748;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .news-section {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .news-section h2 {
            margin-bottom: 1rem;
            color: #2d3748;
        }

        .news-item {
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Service Learning Projects</h1>
    <div class="tab-buttons" id="tabContainer"></div>
</div>

<div class="content" id="infoContainer"></div>

<div class="news-section">
    <h2>Latest News</h2>
    <div id="newsContainer"></div>
</div>

<script>
    const API_URL = '/api';
    let programs = [];
    let currentProgram = null;

    // Prevent auto-refresh / tab jump — load ONLY ONCE when page opens
    window.onload = async function () {
        await loadPrograms();
    };

    async function loadPrograms() {
        try {
            const res = await fetch(`${API_URL}/programs`);
            programs = await res.json();
            if (programs.length > 0) {
                currentProgram = programs[0];
                renderAll();
            }
        } catch (err) {
            console.error('Load error', err);
        }
    }

    function renderAll() {
        renderTabs();
        renderInfoBlocks();
        renderNews();
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        container.innerHTML = '';

        programs.forEach(prog => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (prog.id === currentProgram.id ? ' active' : '');
            btn.innerText = prog.name;
            btn.onclick = () => {
                currentProgram = prog;
                renderAll(); // NO PAGE REFRESH — just update content
            };
            container.appendChild(btn);
        });
    }

    // Render Info + Contact boxes (YOUR LAYOUT)
    function renderInfoBlocks() {
        let blocks = [];
        try {
            if (Array.isArray(currentProgram.blocks)) {
                blocks = currentProgram.blocks;
            } else {
                blocks = JSON.parse(currentProgram.blocks || '[]');
            }
        } catch (e) {
            blocks = [];
        }

        const info = blocks.find(b => b.id === 'info') || { title: 'Information', content: '' };
        const contact = blocks.find(b => b.id === 'contact') || { title: 'Contact', content: '' };

        document.getElementById('infoContainer').innerHTML = `
            <div class="card">
                <h2>${info.title}</h2>
                <p>${info.content}</p>
            </div>
            <div class="card">
                <h2>${contact.title}</h2>
                <p>${contact.content}</p>
            </div>
        `;
    }

    // ✅ NEWS SECTION IS FULLY BACK
    function renderNews() {
        const container = document.getElementById('newsContainer');
        container.innerHTML = '';

        let news = [];
        try {
            if (Array.isArray(currentProgram.news)) {
                news = currentProgram.news;
            } else {
                news = JSON.parse(currentProgram.news || '[]');
            }
        } catch (e) {
            news = [];
        }

        if (news.length === 0) {
            container.innerHTML = '<div class="news-item">No news yet</div>';
            return;
        }

        news.forEach(item => {
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerText = item;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
