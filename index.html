<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Service Learning</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
        }

        /* Tab bar */
        .tab-bar {
            background: #3498db;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 12px;
        }
        .tab {
            padding: 10px 18px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .tab.active {
            background: white;
            color: #3498db;
            font-weight: bold;
        }

        /* Full page content area */
        .tab-content {
            padding: 30px 20px;
            min-height: calc(100vh - 70px);
            max-width: 1000px;
            margin: 0 auto;
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Block styling matching admin */
        .content-block {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            line-height: 1.6;
            white-space: pre-line;
        }
        .content-block h3 {
            margin-bottom: 10px;
            color: #2d3748;
        }

        .no-projects {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .tab-bar {
                padding: 8px;
            }
            .tab {
                padding: 8px 12px;
                font-size: 14px;
            }
            .tab-content {
                padding: 20px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="tab-bar" id="tabBar">
        <!-- Tabs generated here -->
    </div>

    <div id="tabContainer">
        <!-- Full-page tab content loads here -->
    </div>

<script>
function loadTabbedPrograms() {
    const tabBar = document.getElementById('tabBar');
    const tabContainer = document.getElementById('tabContainer');
    const programs = JSON.parse(localStorage.getItem('sl_programs') || '[]');

    if (programs.length === 0) {
        tabContainer.innerHTML = '<div class="no-projects">No service learning projects available.</div>';
        return;
    }

    // Create tabs
    programs.forEach((prog, index) => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (index === 0 ? ' active' : '');
        tab.innerText = prog.name;
        tab.onclick = () => switchTab(prog.id);
        tab.dataset.progId = prog.id;
        tabBar.appendChild(tab);

        // Create full-page content area
        const content = document.createElement('div');
        content.className = 'tab-content' + (index === 0 ? ' active' : '');
        content.id = `content_${prog.id}`;

        prog.blocks.forEach(b => {
            content.innerHTML += `
            <div class="content-block"
                 style="background:${b.bg}; color:${b.text}; border:${b.border}">
                <h3>${b.title}</h3>
                ${b.content}
            </div>`;
        });

        tabContainer.appendChild(content);
    });
}

// Switch between full‑page tabs
function switchTab(progId) {
    // Deactivate all
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    // Activate selected
    document.querySelector(`.tab[data-prog-id="${progId}"]`).classList.add('active');
    document.getElementById(`content_${progId}`).classList.add('active');
}

// Load everything
loadTabbedPrograms();
</script>

</body>
</html>
