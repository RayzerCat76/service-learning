<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Projects</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f5f7fa;max-width:1200px;margin:auto;padding:20px}
        .bar{background:white;padding:20px;border-radius:12px;margin-bottom:20px}
        .tabs{display:flex;gap:10px;flex-wrap:wrap}
        .tab{padding:10px 18px;background:#e6e6e6;border:none;border-radius:6px;cursor:pointer}
        .tab.active{background:#3498db;color:white}
        .two{display:flex;gap:20px}
        .box{background:white;padding:25px;border-radius:12px;width:50%;min-height:400px}
        .box h3{margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid #eee}
    </style>
</head>
<body>

<div class="bar">
    <h2>Service Learning</h2>
    <div id="tabs" class="tabs">Loading...</div>
</div>

<div id="content"></div>

<script>
const API="/api";
let list=[],current;

async function load(){
    const res=await fetch(`${API}/programs?admin=true`);
    list=await res.json();
    if(list.length){current=list[0];render();show()}
}

function render(){
    const t=document.getElementById("tabs");t.innerHTML="";
    list.forEach(p=>{
        const b=document.createElement("button");b.className="tab"+(p.id===current.id?" active":"");b.innerText=p.name;
        b.onclick=()=>{current=p;render();show()};t.appendChild(b);
    });
}

function show(){
    let blocks=[];
    try{blocks=JSON.parse(current.blocks||"[]")}catch{}
    const a=blocks.find(x=>x.id==="info")||{title:"Basic Info",content:""};
    const b=blocks.find(x=>x.id==="contact")||{title:"Contact",content:""};
    document.getElementById("content").innerHTML=`
    <div class="two">
        <div class="box"><h3>${a.title}</h3><p>${a.content}</p></div>
        <div class="box"><h3>${b.title}</h3><p>${b.content}</p></div>
    </div>`;
}

load();
setInterval(load,2000);
</script>
</body>
</html>
