<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Service Learning Projects</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }
        .page-header {
            background: #3498db;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
        }
        .program-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .program-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .program-card h3 {
            color: #2d3748;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .block {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            line-height: 1.6;
            white-space: pre-line;
        }
        .no-projects {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }
        @media (max-width: 768px) {
            .program-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>IB Service Learning Projects</h1>
        <p>Our School Community Initiatives</p>
    </div>

    <div class="program-container" id="programList">
        <!-- Projects load here automatically -->
    </div>

<script>
// Load all programs from the same storage as admin
function loadPublicPrograms() {
    const container = document.getElementById('programList');
    const programs = JSON.parse(localStorage.getItem('sl_programs') || '[]');

    if (programs.length === 0) {
        container.innerHTML = '<div class="no-projects">No service learning projects available yet.</div>';
        return;
    }

    programs.forEach(prog => {
        const card = document.createElement('div');
        card.className = 'program-card';

        let html = `<h3>${prog.name}</h3>`;

        prog.blocks.forEach(b => {
            html += `
            <div class="block" style="background:${b.bg}; color:${b.text}; border:${b.border}">
                <strong>${b.title}</strong><br>
                ${b.content}
            </div>`;
        });

        card.innerHTML = html;
        container.appendChild(card);
    });
}

// Load immediately when page opens
loadPublicPrograms();
</script>

</body>
</html>
